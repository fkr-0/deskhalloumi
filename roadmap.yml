schema_version: 2
kind: internal_maintainer_roadmap
updated_at: '2026-07-18'
project:
  name: DeskHalloumi
  slug: deskhalloumi
  repository: https://github.com/fkr-0/deskhalloumi
  current_version: 0.2.0
  supported_session: i3/X11
  compatibility_boundary:
  - unilii command aliases remain available during 0.x
  - legacy config and runtime paths remain readable
  - legacy application IDs remain stable where window-manager rules depend on them
planning_principles:
- Preserve a small, dependable desktop kernel rather than adding parallel menu, action, or hotkey stacks.
- Keep UI work asynchronous and cancellation-safe; blocking system APIs belong behind explicit bounded adapters.
- Prefer typed actions, structured errors, bounded channels, bounded output, and timeouts over unstructured shell glue.
- Treat generated i3 configuration and selective native X11 grabs as distinct supported deployment modes.
- Keep release tags immutable and make every published binary reproducible from an annotated source tag.
- Make hardware, locale, and live-session assumptions explicit in tests.
- Do not claim Sway or Wayland global-hotkey parity before a separately tested backend exists.
current_baseline:
  release:
    tag: v0.2.0
    source_status: published
    linux_binary_archive: published
    checksum: published
    crates_io: not_published
  quality:
    formatting: green
    safe_workspace_tests: green
    isolated_i3_x11_tests: green
    current_stable_clippy: green
    release_toolchain: '1.94.1'
  completed_foundations:
  - DeskHalloumi rename with pre-1.0 compatibility aliases
  - standalone hotkey supervisor with transactional reload
  - recursive i3 configuration audit and atomic include generation
  - selective native X11 hotkey backend
  - dynamic evdev keyboard hot-plug handling
  - versioned local action bus
  - deterministic Linux release archive
  - shared menu and popup implementation slices
release_targets:
- version: 0.2.1
  theme: reliability, distribution, and documentation
  exit_criteria:
  - GitHub Releases are the durable binary distribution channel.
  - installation, upgrade, rollback, and checksum instructions are complete.
  - asynchronous command execution is timeout-bounded, output-bounded, and descendant-safe.
  - current-stable CI and the pinned release toolchain are both documented.
- version: 0.3.0
  theme: structured runtime and action execution
  exit_criteria:
  - detached long-lived tasks are replaced by owned supervisors or documented process-lifetime tasks.
  - action execution has one typed policy for timeout, cwd, environment, output, and cancellation.
  - provider refreshes use bounded concurrency and explicit stale/error states.
  - runtime metrics expose task failures, command timeouts, and dropped/coalesced updates.
- version: 0.4.0
  theme: widget and provider architecture
  exit_criteria:
  - clock, battery, network, audio, and system providers share one lifecycle contract.
  - provider state can be tested without live desktop services.
  - external command widgets use a bounded versioned protocol.
- version: 0.5.0
  theme: menu and automation convergence
  exit_criteria:
  - tray, widget, custom, and filterer menus share one renderer-neutral model.
  - CLI introspection can list and invoke active actions, menus, widgets, and hotkeys.
  - action history and failure feedback are visible from the panel.
- version: 1.0.0
  theme: stable desktop-control contract
  exit_criteria:
  - public configuration and IPC schemas have explicit compatibility guarantees.
  - installation and rollback are package-quality.
  - legacy unilii compatibility has a documented retirement decision.
  - supported platform/session boundaries are stable and tested.
workstreams:
- id: REL
  name: release and distribution
  priority: P0
  status: active
  completed:
  - annotated v0.2.0 tag
  - deterministic Linux x86-64 archive
  - SHA-256 checksum
  - public GitHub Release assets
  next:
  - id: REL-01
    task: Publish release archives and checksums automatically from the validated release workflow.
    acceptance:
    - Existing release assets are replaced atomically on an explicit retry.
    - Release notes come from docs/releases/<version>.md.
    - The checksum file verifies from the download directory without path rewriting.
  - id: REL-02
    task: Add packaging targets for Arch Linux and a generic install script without weakening source-tag verification.
    acceptance:
    - Install and uninstall are reproducible.
    - User systemd units are installed without being enabled implicitly.
  - id: REL-03
    task: Decide whether first-party crates should be published to crates.io.
    acceptance:
    - Internal-only crates are clearly marked or publishable metadata is complete.
- id: ASYNC
  name: async runtime modernization
  priority: P0
  status: active
  completed:
  - id: ASYNC-01
    task: Replace blocking action command polling with tokio process handling.
  - id: ASYNC-02
    task: Bound generic action duration and captured stdout/stderr.
  - id: ASYNC-03
    task: Introduce owned task supervision for process-lifetime workers.
    evidence:
    - deskhalloumi_core::runtime::RuntimeSupervisor owns a bounded spawn queue and JoinSet.
    - The action-bus listener, connection workers, embedded hotkey daemon, and module producers/consumers are registered with the bar supervisor.
    - The retained hotkey daemon worker remains explicitly owned by its reload supervisor.
  - id: ASYNC-04
    task: Replace synchronous process execution on active UI-sensitive paths.
    evidence:
    - Audio, Wi-Fi, power, video, CopyQ, filter-tab previews, i3 visualizer UI actions, tray network actions, mount discovery, Tmux, and CalDAV now use Tokio process handling.
    - Disk usage uses statvfs instead of spawning df.
    - Remaining std::process calls are confined to exec-style compatibility launchers, headless CLI helpers, and the separately synchronous scaffold bar runtime.
  - id: ASYNC-05
    task: Add bounded provider concurrency, coalescing, and backpressure metrics.
    evidence:
    - ProviderRefreshRegistry admits a bounded number of keyed refreshes and coalesces duplicate in-flight requests.
    - Module producers publish through latest-value watch channels and record overwritten or closed updates.
    - Task spawn queues are bounded and report saturation.
  - id: ASYNC-06
    task: Define cancellation-safe shutdown contracts for bar, action-bus, tray, hotkey, and provider workers.
    evidence:
    - The bar cancels and joins its runtime supervisor with a two-second shutdown bound.
    - Action-bus socket ownership is scoped to the supervised listener.
    - Module producers and consumers select on the shared cancellation token.
    - Tray subscription children are retained in a JoinSet.
  next:
  - id: ASYNC-07
    task: Add generation-aware provider state and retain last-known-good values across failed or late refreshes.
    acceptance:
    - Late results from replaced generations cannot overwrite newer state.
    - Provider state distinguishes loading, fresh, stale, and unavailable.
  - id: ASYNC-08
    task: Expose runtime metrics through a local diagnostic command or action-bus query.
    acceptance:
    - Operators can inspect task, action, timeout, truncation, refresh, and queue-pressure counters without stopping the bar.
  - id: ASYNC-09
    task: Decide whether the synchronous deskhalloumi-bar scaffold should adopt the shared Tokio runtime or remain a deliberately headless blocking CLI.
    acceptance:
    - The supported runtime boundary is explicit in documentation and tests.
- id: ARCH
  name: architecture decomposition
  priority: P1
  status: active
  completed:
  - id: ARCH-02
    task: Move ActionRunner policy into the shared deskhalloumi-core runtime boundary.
  - id: ARCH-03
    task: Replace the fixed clock/battery registry with generic latest-value module storage and polling.
  next:
  - id: ARCH-01
    task: Continue splitting main.rs into bootstrap, runtime ownership, action routing, and Iced adapter modules.
  - id: ARCH-04
    task: Consolidate menu lifecycle and filtering into one renderer-neutral model.
- id: HOTKEY
  name: hotkeys and input semantics
  priority: P1
  status: active
  next:
  - id: HOTKEY-01
    task: Define explicit logical-key versus physical-key configuration semantics.
    acceptance:
    - US and German layout-sensitive shortcuts have tests.
    - Import/export diagnostics explain layout-dependent changes.
  - id: HOTKEY-02
    task: Extend sxhkd migration only for constructs with representable semantics.
    acceptance:
    - Unsupported chains, replay, and synchronous semantics never become silent approximations.
  - id: HOTKEY-03
    task: Add reload and device churn soak tests with CPU, memory, task, and log-volume budgets.
- id: DOC
  name: documentation and operator experience
  priority: P1
  status: active
  next:
  - id: DOC-01
    task: Maintain a navigable documentation index and clear audience labels.
  - id: DOC-02
    task: Add complete binary install, source build, systemd, upgrade, rollback, and troubleshooting guides.
  - id: DOC-03
    task: Document async runtime ownership, blocking boundaries, cancellation, and subprocess policy.
  - id: DOC-04
    task: Add task-oriented examples for panel-only, hotkeys-only, and combined deployments.
- id: WAYLAND
  name: compositor portability
  priority: P2
  status: research
  next:
  - id: WAYLAND-01
    task: Write a backend feasibility ADR for Sway/Wayland shortcuts, output control, and layer-shell behavior.
  - id: WAYLAND-02
    task: Prototype only behind an explicit experimental feature and isolated compositor tests.
quality_gates:
  required_for_every_merge:
  - cargo fmt --all -- --check
  - python3 scripts/check_release_metadata.py
  - scripts/test_safe.sh for production-code changes
  - CARGO_INCREMENTAL=0 cargo clippy --workspace --all-targets -- -D warnings
  required_for_hotkey_or_i3_changes:
  - scripts/test_i3_hotkeys.sh
  required_for_release:
  - python3 scripts/check_release_metadata.py --release --require-clean
  - annotated tag points to the intended source commit
  - deterministic archive and checksum are generated
  - release notes exist under docs/releases
  - downloadable assets are attached to the GitHub Release
runtime_metrics:
  implemented:
  - active supervised task count
  - task starts, completions, cancellations, and panics
  - action starts, completions, failures, duration total/max, and timeout count
  - truncated stream count and discarded byte count
  - provider refresh starts, completions, coalescing, and saturation
  - coalesced and dropped update counts
  remaining:
  - idle CPU and resident memory
  - hotkey reload success, rollback, and duration
  - DBus and action-bus request latency
  - per-provider stale age and generation
risk_register:
- risk: main.rs remains a high-coupling integration boundary.
  mitigation: extract ownership boundaries in small tested slices.
- risk: headless compatibility and scaffold paths still use synchronous command helpers.
  mitigation: keep them out of Iced update paths and decide their long-term runtime contract in ASYNC-09.
- risk: late provider results can overwrite newer state during future live reload work.
  mitigation: add generation-aware provider state and stale-result suppression in ASYNC-07.
- risk: Linux release binaries are not portable across all distributions.
  mitigation: document the glibc/system-library boundary and add distro packaging or broader build targets.
- risk: compatibility aliases expand maintenance cost.
  mitigation: track usage and make a pre-1.0 retirement decision.
