open_design_questions:
  - id: Q1
    question: "Should production start combined or daemon+panel split?"
    recommended_default: "combined process with crate boundaries first; split after IPC/action bus tests exist"
  - id: Q2
    question: "External widgets: JSON-lines command widgets or native dynamic plugins first?"
    recommended_default: "JSON-lines command widgets first for scriptability and failure isolation"
  - id: Q3
    question: "Which global key backend is official first target?"
    recommended_default: "use existing Linux backend first, then document X11/evdev/winit/Wayland constraints explicitly"
  - id: Q4
    question: "Should rofi-like filterer be a separate binary or panel mode?"
    recommended_default: "shared model with panel/menu frontend first; separate binary later if useful"
  - id: Q5
    question: "What compatibility promise applies to i3, X11, Wayland, and non-i3 WMs?"
    recommended_default: "declare i3/X11-oriented first-class support until backend adapters prove otherwise"
