version: 1
generated_at: "2026-05-16"
roadmap:
  title: "uniliii modular desktop-component replacement roadmap"
  target_project:
    requested_name: "uniliii"
    observed_repository_name: "unilii"
    path: "/home/user/work/code/unilii"
  strategic_scope:
    primary:
      toolbar:
        replaces: ["i3bar", "polybar"]
        target_state: "multi-panel toolbar host with typed widgets, custom menus, tray/status integrations, hot reload, scriptability, and keyboard-first UX"
      hotkeydaemon:
        replaces: ["sxhkd"]
        target_state: "standalone-capable global hotkey service with sxhkd import, typed actions, modes/chords/releases, conflict analysis, and panel/menu integration"
    auxiliary:
      notification_center:
        target_state: "DBus notification intake, history, grouping, actions, and panel/menu surfacing"
        start_after: ["typed_action_bus", "shared_menu_model"]
      enhanced_panel_modules:
        examples: ["weather", "audio", "network", "workspace", "system", "calendar"]
        start_after: ["widget_runtime"]
      rofi_type_filterer:
        target_state: "fast item filterer using the same MenuModel, FilterState, keymaps, and action bus as toolbar menus"
        start_after: ["shared_menu_model", "hotkey_engine"]
  review_basis:
    local_inputs:
      - "tasks.yml from prior review"
      - "AGENTS.md current architecture overview"
      - "CONFIGURATION.md multi-panel and keybinding docs"
      - "KEYBINDINGS.md current keybinding docs"
      - "current command evidence from prior review: cargo check passes with warnings; cargo test and clippy fail"
      - "modrelease-2 as tested reference for menu lifecycle, modifier release, workspace flow, keymaps, and preview models"
    current_strengths:
      - "Rust workspace already has core/lib/bin/plugin separation."
      - "Iced direction is suitable for a modern panel UI."
      - "Config already models panels, modules, and keybindings."
      - "There is existing tray/menu/keybinding experimentation with many unit tests."
    current_blockers:
      - "Baseline tests/lints are red; strategic work must begin with stabilization."
      - "main.rs is still a god module and should not remain the architecture boundary."
      - "Competing tray/menu/app state models need consolidation."
      - "Current keybinding docs are X11 keysym-oriented; sxhkd replacement needs backend-neutral key semantics."
      - "Widget/plugin contracts are not yet strong enough for scriptable external modules."
  product_thesis: >-
    uniliii should evolve into a desktop augmentation stack, not merely a bar. A small desktop kernel should own typed actions, configuration, lifecycle, IPC, hotkey state, provider state, and capability registration. Panels, widgets, menus, tray, notifications, filterers, scripts, and CLIs become clients of that kernel. Toolbar and hotkeydaemon are solved first because they define the shared interaction contract for focus, actions, shortcuts, menus, command execution, feedback, and scriptability.
  architecture_recommendation:
    shape: "single repository, multiple crates, initially one process, later optional daemon/panel split"
    preferred_sequence:
      - "Keep one binary/process while extracting crate/module boundaries."
      - "Introduce a typed action bus and stable domain models."
      - "Only split daemon/panel after IPC and action routing are tested."
    target_crates:
      uniliii_core: "IDs, config schema, domain types, typed errors, capability registry, versioned contracts"
      uniliii_action: "Action parser/executor, shell bridge, permissions, dry-run, ActionResult"
      uniliii_hotkeys: "Key grammar, sxhkd import, conflict detection, modes/chords/releases, backend adapters"
      uniliii_panel: "Iced shell, windows/panels, layout, theme, focus, animation"
      uniliii_widgets: "Widget runtime, built-in widget traits, update scheduling, render models"
      uniliii_menus: "MenuModel, FilterState, lifecycle, keyboard navigation, rofi-like list primitives"
      uniliii_providers: "Clock, battery, network, audio, weather, process, workspace data providers"
      uniliii_tray: "StatusNotifier and DBus tray host boundary"
      uniliii_notify: "Future notification daemon/center DBus interop"
      uniliii_ipc: "Unix socket or DBus control protocol and event subscriptions"
      uniliii_cli: "validate, reload, query, run action, import sxhkd, inspect conflicts"
    central_boundaries:
      typed_action_bus:
        purpose: "Common route for hotkeys, menu items, tray items, scripts, widgets, and CLI commands."
        action_namespaces: ["internal", "shell", "widget", "menu", "tray", "desktop", "notification", "ipc"]
      config_schema:
        purpose: "Versioned declarative product configuration with validation and hot reload."
        must_have: ["schema version", "includes/profiles", "per-panel layout", "keybinding modes", "action validation", "script timeout policy", "theme tokens"]
      widget_runtime:
        purpose: "Small widget state machines with config, provider subscriptions, render models, menu declarations, and stale/error states."
      menu_system:
        purpose: "One renderer-neutral interaction model for tray menus, widget menus, workspace selectors, and future filterer."
      hotkey_engine:
        purpose: "Backend-neutral key state engine with sxhkd import compatibility, not an sxhkd text-format clone internally."
  ux_principles:
    - "Keyboard-first; pointer-friendly second."
    - "Every visible item should be invokable by hotkey or action bus."
    - "Menus are transient and predictable: open, navigate, filter, confirm, cancel, focus-loss, release-to-confirm."
    - "Provider failures show stale/error states rather than breaking the panel."
    - "Scriptability is discoverable through CLI introspection, dry-run, validation, and action listing."
    - "Performance prioritizes low idle CPU, bounded provider work, coalesced updates, and virtualized large lists."
  non_goals_until_toolbar_and_hotkeys_are_solved:
    - "No compositor or full window manager."
    - "No plugin marketplace."
    - "No notification center as architecture driver before action/menu/hotkey foundations."
    - "No copying modrelease-2 Cairo/X11 renderer into the Iced panel host."
    - "No unlimited script execution before timeouts, output bounds, and error feedback exist."

milestones:
  - id: M0
    name: "stabilize baseline"
    goal: "Make the current tree trustworthy before architecture migration."
    solves: ["precondition-toolbar", "precondition-hotkeydaemon"]
    deliverables:
      - "green cargo test --workspace"
      - "green clippy gate or documented temporary lint exceptions"
      - "archive/reference files classified"
      - "root docs updated to current workspace reality"
    acceptance_criteria:
      - "BUG-001 and BUG-002 from tasks.yml are fixed with tests."
      - "cargo test --workspace exits 0."
      - "cargo clippy --workspace --all-targets -- -D warnings exits 0 or exceptions reference task IDs."
    successor_tasks_yml_candidates:
      - "Fix tray unknown icon fallback regression."
      - "Fix CalDAV datetime normalization lint."
      - "Replace tautological WiFi test."
      - "Classify archive/reference artifacts."
  - id: M1
    name: "desktop-kernel architecture ADR"
    goal: "Document the professional product architecture before moving code."
    solves: ["toolbar-architecture", "hotkeydaemon-architecture"]
    deliverables:
      - "docs/plans/YYYY-MM-DD-uniliii-desktop-kernel-architecture.md"
      - "crate/module boundary map"
      - "current module inventory: keep, move, merge, delete, archive"
      - "modrelease-2 import/adapt/reject compatibility table"
    acceptance_criteria:
      - "Every major current module has a target owner or archive status."
      - "No future milestone depends on main.rs as the long-term boundary."
      - "The design separates domain-model tests from Iced rendering tests."
    successor_tasks_yml_candidates:
      - "Write desktop-kernel architecture ADR."
      - "Create module inventory and move/delete decision table."
      - "Define IDs for panels, widgets, actions, menus, keybindings, providers."
  - id: M2
    name: "typed action bus"
    goal: "Make hotkeys, menus, widgets, tray items, scripts, and CLI commands dispatch through one typed route."
    solves: ["toolbar-custom-menus", "hotkeydaemon-dispatch", "future-notifications", "future-filterer"]
    deliverables:
      - "Action enum and serialized action schema"
      - "Action parser for config and CLI strings"
      - "ActionExecutor for internal, shell, widget, menu, tray, desktop, notification, and IPC namespaces"
      - "ActionResult with rejected/unavailable/timeout/failed/permission-denied states"
      - "dry-run and audit output"
    acceptance_criteria:
      - "A keybinding, menu item, and CLI invocation can execute the same typed action."
      - "Invalid actions fail config validation with actionable diagnostics."
      - "Shell commands have timeout, environment, cwd, and bounded output policy."
      - "No action execution blocks the UI thread."
    successor_tasks_yml_candidates:
      - "Extract action_runner into action domain module/crate."
      - "Define Action and ActionResult tests."
      - "Wire keybinding/menu/tray commands through ActionExecutor."
  - id: M3
    name: "panel shell and layout kernel"
    goal: "Replace i3bar/polybar at the window/layout layer."
    solves: ["toolbar-base"]
    deliverables:
      - "PanelId, PanelConfig, PanelGeometry, PanelPlacement, StrutPolicy, MonitorSelector"
      - "Iced multi-panel shell with hot-reloadable layout"
      - "documented dock/strut reservation strategy per backend"
      - "panel lifecycle: create, update, hide, show, destroy, reload"
      - "theme and density tokens separate from widgets"
    acceptance_criteria:
      - "Two panels can be configured independently."
      - "Layout reload updates geometry without process restart where possible."
      - "Layout tests cover zones, overflow, alignment, and monitor targeting."
      - "Provider updates do not stall UI responsiveness."
    successor_tasks_yml_candidates:
      - "Extract panel geometry domain types."
      - "Write layout tests for left/center/right zones and overflow."
      - "Move panel/window bootstrap out of main.rs."
  - id: M4
    name: "widget runtime"
    goal: "Make toolbar content modular, configurable, testable, and scriptable."
    solves: ["toolbar-widget-system", "enhanced-panel-foundation"]
    deliverables:
      - "WidgetInstance lifecycle: init, validate, subscribe, update, render-model, menu-model, shutdown"
      - "Provider cache and subscription manager with backpressure"
      - "error/stale-state model for every widget"
      - "clock and battery migrated first; network/audio/system/tmux/weather later"
      - "external command widget protocol design"
    acceptance_criteria:
      - "Widgets can be added, removed, disabled, and reconfigured without panel-core edits."
      - "At least three built-in widgets use the same lifecycle."
      - "Widget parser/render-model tests do not require live system state."
      - "Provider updates are coalesced."
    successor_tasks_yml_candidates:
      - "Define WidgetInstance and WidgetUpdate contracts."
      - "Migrate clock and battery to widget runtime."
      - "Design external command widget JSON protocol."
  - id: M5
    name: "shared menu and filter model"
    goal: "Unify custom menus, tray menus, widget menus, workspace selectors, and rofi-like filterer foundations."
    solves: ["toolbar-custom-menus", "future-filterer"]
    deliverables:
      - "MenuModel, MenuItem, MenuAction, MenuState, MenuLifecycle, FilterState"
      - "modrelease-2 lifecycle semantics ported as renderer-neutral tests"
      - "filter/ranking API for large lists"
      - "virtualized list rendering strategy"
      - "Menu-to-action-bus integration"
    acceptance_criteria:
      - "Tray, widget, and custom menus use the same model."
      - "Escape, focus-loss, click-outside, navigation, confirm, and modifier-release behavior are consistent."
      - "Synthetic 10k-item list can filter within a documented responsiveness budget."
      - "Menu state is inspectable via debug/IPC tooling."
    successor_tasks_yml_candidates:
      - "Port modrelease-2 menu lifecycle tests."
      - "Create renderer-neutral MenuModel and FilterState."
      - "Replace bespoke tray/widget menu state with shared model."
  - id: M6
    name: "hotkeydaemon engine"
    goal: "Build the backend-neutral keyboard state engine that can replace sxhkd."
    solves: ["hotkeydaemon-core"]
    deliverables:
      - "KeySpec grammar for modifiers, keys, press, release, hold, repeat, chord, sequence, and mode"
      - "backend abstraction for key event sources"
      - "conflict detector with explanations"
      - "mode stack: default, transient, locked, passthrough"
      - "release-to-confirm semantics shared with menus"
      - "action bus dispatch on press/release/mode transition"
    acceptance_criteria:
      - "Standalone hotkey service can parse config and execute shell/internal actions."
      - "Conflicts are detected before runtime."
      - "Focused tests cover press, release, chord, sequence, mode enter/exit, repeat suppression, and conflict reporting."
      - "The engine can run without panel UI."
    successor_tasks_yml_candidates:
      - "Extract key_engine into hotkey domain module/crate."
      - "Define KeySpec and KeyEvent tests."
      - "Write conflict detector tests."
      - "Implement mode stack and release-to-confirm tests."
  - id: M7
    name: "sxhkd compatibility and migration"
    goal: "Let users replace sxhkd incrementally instead of rewriting all shortcuts."
    solves: ["hotkeydaemon-compatibility"]
    deliverables:
      - "sxhkd parser/importer"
      - "translation report: exact, approximate, unsupported"
      - "generated uniliii keybinding config"
      - "realistic sxhkdrc fixtures"
      - "CLI commands: import-sxhkd, validate, conflicts, explain"
    acceptance_criteria:
      - "Common sxhkd patterns import losslessly or explain why not."
      - "Unsupported constructs do not silently degrade."
      - "Generated config validates and can dry-run."
    successor_tasks_yml_candidates:
      - "Implement sxhkd parser fixtures."
      - "Generate keybinding config from parsed sxhkd bindings."
      - "Add unsupported construct diagnostics."
  - id: M8
    name: "toolbar-hotkey integrated UX"
    goal: "Make toolbar and hotkeydaemon feel like one desktop system."
    solves: ["toolbar-professional-ux", "hotkeydaemon-professional-ux"]
    deliverables:
      - "hotkey-driven menu launcher"
      - "panel-visible mode indicators"
      - "generated keybinding help overlay"
      - "action history and failure feedback surface"
      - "coherent reload of panels, widgets, actions, and hotkeys"
    acceptance_criteria:
      - "Changing keybinding config updates daemon behavior and help UI coherently."
      - "A hotkey can open a widget menu, filter, confirm, and show result without pointer input."
      - "Failed commands show bounded user-meaningful feedback."
      - "Hotkey-triggered shell actions do not freeze UI."
    successor_tasks_yml_candidates:
      - "Generate keybinding help model from active config."
      - "Add hotkey mode indicator widget."
      - "Wire ActionResult into panel feedback surface."
  - id: M9
    name: "scriptability and external control"
    goal: "Expose automation without unsafe shell-glue architecture."
    solves: ["toolbar-scriptability", "hotkeydaemon-scriptability"]
    deliverables:
      - "CLI: query, action, hotkeys, widgets, panels, menus, reload, validate"
      - "IPC protocol for local control and subscriptions"
      - "external command widget protocol using JSON lines or request/response JSON"
      - "script permission, timeout, and bounded-output model"
      - "machine-readable introspection output"
    acceptance_criteria:
      - "Scripts can query current panels/widgets/hotkeys."
      - "Scripts can trigger typed actions with dry-run."
      - "External widgets can produce text/progress/icon/menu output through bounded protocol."
      - "Bad scripts fail closed and visibly."
    successor_tasks_yml_candidates:
      - "Define IPC protocol and CLI query schema."
      - "Implement action dry-run CLI."
      - "Prototype external command widget with JSON fixtures."
  - id: M10
    name: "performance, reliability, packaging"
    goal: "Make toolbar and hotkeydaemon day-to-day reliable."
    solves: ["toolbar-production-readiness", "hotkeydaemon-production-readiness"]
    deliverables:
      - "idle CPU/memory benchmark"
      - "redraw/update performance budgets"
      - "provider failure and timeout tests"
      - "config reload stress tests"
      - "systemd user units"
      - "install/uninstall/package docs"
    acceptance_criteria:
      - "Idle CPU and redraw rates meet documented budgets."
      - "Provider crashes/timeouts do not crash panel or hotkeys."
      - "Repeated config reload stays stable."
      - "User can install panel-only, hotkeys-only, or combined stack."
    successor_tasks_yml_candidates:
      - "Add performance benchmark harness."
      - "Add provider timeout/failure tests."
      - "Write systemd user units for daemon and panel."
  - id: M11
    name: "auxiliary capability wave"
    goal: "Build notification center, weather modules, and rofi-like filterer on solved foundations."
    dependency: "Start after M2, M5, M6, and M8 are materially complete."
    solves: ["notification-center", "enhanced-panel-system", "rofi-filterer"]
    deliverables:
      - "notification center using DBus provider, shared menu/list model, and action bus"
      - "weather provider/widget using widget runtime and stale/error states"
      - "filterer frontend using MenuModel, FilterState, keymaps, and action dispatch"
    acceptance_criteria:
      - "Auxiliary modules do not introduce a second menu/action/keybinding stack."
      - "Auxiliary features can be controlled by CLI, hotkeys, and panel UI."
    successor_tasks_yml_candidates:
      - "Design notification center DBus provider boundary."
      - "Build weather provider as widget-runtime conformance test."
      - "Build filterer as menu/filter frontend."

architecture_quality_gates:
  mandatory:
    - "Write or select failing tests first."
    - "Verify RED failure before behavior implementation."
    - "Run focused tests before full workspace tests."
    - "Run cargo test --workspace before claiming completion."
    - "Run clippy gate before merging architecture changes."
  modularity:
    - "No new feature code in main.rs except temporary wiring."
    - "Every subsystem has an owner crate/module."
    - "Cross-subsystem behavior flows through typed actions, providers, or documented APIs."
  extensibility:
    - "Config schema is versioned."
    - "Widget/action/menu protocols are serializable and documented."
    - "External scripts use stable CLI/IPC, not private internals."
  performance:
    - "No blocking provider or action work on the UI thread."
    - "Polling sources have rate limits and stale/error semantics."
    - "Large menus use filtering and virtualization."
  reliability:
    - "Provider and script failures are isolated."
    - "Poisoned locks, invalid actions, and timeouts do not panic the panel."
    - "Reload failures keep last-known-good config active."
  ux:
    - "Keyboard-only operation is an acceptance criterion."
    - "Action results and errors are visible, inspectable, and bounded."
    - "Mode, focus, and menu state are predictable and recoverable."

