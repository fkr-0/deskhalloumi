- id: T2
  title: merge useful modrelease-2 UX/UI mechanics into unilii
  description: Port proven menu, tabbar, focus, keybinding, workspace, and preview interaction semantics from modrelease-2
    into unilii's Iced architecture.
  consequences: Done carefully, unilii gains mature interaction mechanics without inheriting modrelease-2's older renderer/windowing
    stack.
  emerging_tasks:
  - 'Create compatibility notes for every modrelease-2 concept: copied, adapted, rejected, or deferred.'
  priority: P0
  affected_regions:
  - /home/user/code/modrelease-2/src/ui/*
  - /home/user/code/modrelease-2/src/util/*
  - /home/user/code/modrelease-2/tests/*
  - unilii/bin/src/menus/*
  - unilii/bin/src/enhanced_tray/*
  - unilii/core/src/*
  conceptual_adherence:
    unilii_superior_ui: unilii remains the UI host; modrelease-2 supplies interaction mechanics and regression cases.
    no_blind_copy: Do not copy Cairo render code, X11 focus calls, or model structs unchanged unless they are renderer-independent.
    test_first_merge: Every imported mechanic starts as a failing unilii test derived from modrelease-2 behavior.
  further_work:
  - After parity tests pass, retire redundant unilii-specific bespoke code.
  - 'Canonical architecture note now defines the modrelease-2 import policy: port behavior/model tests, not Cairo/X11 renderer
    stack.'
  test_cases:
  - Ported modrelease-2 tests should fail in unilii before implementation and pass after adaptation.
  - Existing unilii tray/menu tests stay green.
  definition_of_done:
  - Each imported mechanic has an explicit unilii test and no direct dependency on modrelease-2.
  - UX flows are documented in CONFIGURATION.md or docs/plans.
  points_for_later_review:
  - Reassess whether modrelease-2 should remain a reference repo or become a test fixture source.
  subtasks:
  - id: T2.1
    title: port menu lifecycle semantics
    description: 'Adapt modrelease-2 MenuWidget behavior: visible/hidden lifecycle, Escape dismissal, click-outside dismissal,
      focus-loss dismissal, keyboard navigation, selection, and action emission.'
    consequences: All unilii menus get consistent interaction behavior instead of feature-specific logic.
    emerging_tasks:
    - Define a renderer-neutral MenuModel for Iced views.
    - Map MenuAction to unilii Message or Task results.
    - Menu modules now carry local transition allowances; shared MenuModel integration should remove those allowances by wiring
      tested menu models into production paths.
    - Menu event integration now updates EnhancedTrayState tree directly; shared MenuModel should eventually replace direct
      tree mutations with typed menu state updates.
    - update/tray_navigation.rs provides another renderer-free state transition module that shared MenuModel lifecycle work
      can emulate.
    - update/tray_favorites.rs is another small renderer-free update module to mirror when designing menu lifecycle state
      transitions.
    - update/tray_view.rs now contains renderer-free menu/view lifecycle helpers; use it as a stepping stone toward the shared
      MenuModel lifecycle.
    - update/tray_text_input.rs owns recursive text input mutation; shared MenuModel work should preserve this as a model-level
      operation.
    - update/tray_menu_fetch.rs now owns fallback menu construction; shared MenuModel work should replace or formalize this
      fallback menu shape.
    - update/tray_icon_press.rs establishes another renderer-free transition boundary; shared MenuModel work can reuse this
      pattern for menu-open decisions.
    - update/tray_snapshots.rs demonstrates provider-result-to-menu-state transitions; shared MenuModel should use the same
      provider/result boundary.
    - Command-result-to-view-state helpers now live beside snapshot-result helpers; shared MenuModel should preserve this
      result/update split.
    - Animation lifecycle is separated from rendering; shared MenuModel should preserve lifecycle/update separation.
    priority: P0
    affected_regions:
    - /home/user/code/modrelease-2/docs/menu.md
    - /home/user/code/modrelease-2/src/ui/widgets/menu.rs
    - unilii/bin/src/menus/*
    - unilii/bin/src/enhanced_tray/state.rs
    conceptual_adherence:
      imported: lifecycle semantics, state shape, action dispatch expectations
      rejected: Cairo RenderContext and direct X11 input grabbing
      adapted: Command/Event becomes Iced Message/Task or local effect enum
    further_work:
    - Add a MenuController trait only if two real menu implementations need it.
    - README now documents network/mount/calendar/custom menu models; shared MenuModel work should update README/CONFIGURATION.md
      when menu lifecycle becomes canonical.
    test_cases:
    - escape hides active menu
    - click outside hides active menu
