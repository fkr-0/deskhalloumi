# BEGIN generated feature implementation plan: polybar_makepad
feature_implementation_plan:
  id: "polybar_makepad"
  title: "Polybar replacement using Makepad"
  source_reviewed:
    - "features.md"
    - "Cargo.toml"
    - "crates/unilii-core/src/module.rs"
    - "crates/unilii-cli/src/main.rs"
    - "crates/unilii-ui/README.md"
  reviewed_at: "2026-05-25"
  status: "in_progress"
  owner: "implementation pass"
  objective: >
    Implement a native Makepad-powered top bar binary named unilii-bar that can
    replace the current Polybar workflow while reusing unilii scanning,
    metadata, config generation, and module-discovery concepts.
  scope:
    in:
      - "Native top-of-screen bar application with left, center, and right zones."
      - "Declarative TOML configuration for bar geometry, theme, layout, modules, and actions."
      - "Independent module update runtime supporting intervals, event streams, hot reload, and click actions."
      - "Core modules: workspaces, window_title, clock, system, network, vpn, audio, battery, script, notifications."
      - "Bar-specific module provider metadata integrated with existing scan/config-generation flow."
      - "Docs and examples for i3, sway, generic X11 fallback, and WM rule setup."
    out:
      - "Perfect Polybar config compatibility."
      - "A full desktop shell or compositor."
      - "Dynamic plugin loading as the first implementation path."
      - "A full notification daemon unless explicitly promoted from future work."
  codebase_fit:
    existing_strengths:
      - "The workspace already uses crates/*, so crates/unilii-bar can be added as a normal workspace member."
      - "unilii-core already has config, schema, manifest, module, and registry concepts that can be extended with bar metadata."
      - "unilii-cli already has config-oriented commands that can gain bar config generation without creating a second CLI."
      - "Scanner-related crates already provide a natural home for discovering bar module provider metadata."
    guardrails:
      - "Keep Makepad dependencies isolated in crates/unilii-bar so existing CLI/core crates do not pay UI dependency cost."
      - "Do not force the existing command-oriented Module trait to represent long-running live widgets. Add a bar-specific trait and metadata bridge instead."
      - "Keep crates/unilii-ui as the terminal UI crate; do not mix ratatui/crossterm concerns with the Makepad bar."
      - "Treat screen-space reservation as best effort until the target compositor/window-manager stack is proven."
  release_slices:
    mvp:
      goal: "A useful bar that can replace a simple Polybar config for daily use."
      includes:
        - "unilii-bar starts and renders a top bar with theme and zones."
        - "Config parsing, validation, defaults, sample template, and hot reload are working."
        - "Clock, script, basic CPU, memory, network, audio, battery, workspaces, and window title are functional with graceful fallbacks."
        - "i3 and sway command backends are documented and usable."
    full:
      goal: "The complete feature spec is implemented with registry integration, tests, docs, and hardening."
      includes:
        - "All core modules listed in features.md are implemented."
        - "Bar module provider metadata is discoverable through the existing unilii scan/config-generation path."
        - "Module actions, scheduler cancellation, script timeouts, and threshold states are covered by tests."
        - "Install/startup docs cover common WM setups and known platform limitations."
  dependency_order:
    - "BAR-M0"
    - "BAR-M1"
    - "BAR-M2"
    - "BAR-M3"
    - "BAR-M4"
    - "BAR-M5"
    - "BAR-M6"
    - "BAR-M7"
    - "BAR-M8"
    - "BAR-M9"
    - "BAR-M10"
    - "BAR-M11"
  milestones:
    - id: "BAR-M0"
      title: "Set architecture decisions and MVP boundaries"
      priority: "P0"
      status: "done"
      depends_on: []
      objective: "Resolve the open questions from features.md before committing to APIs that will be hard to change."
      tasks:
        - id: "BAR-M0-T01"
          title: "Choose first WM backend targets"
          details: "Use i3 and sway command backends first unless project constraints require a different primary target. Keep x11-generic as fallback work."
        - id: "BAR-M0-T02"
          title: "Decide initial plugin model"
          details: "Start with built-in linked modules plus script modules. Defer dynamic libraries until the metadata and runtime contracts stabilize."
        - id: "BAR-M0-T03"
          title: "Define module rendering boundary"
          details: "Use text/view-model rendering for the first module set; allow Makepad-specific view binding metadata for richer modules later."
        - id: "BAR-M0-T04"
          title: "Document screen-reservation strategy"
          details: "Identify what Makepad can do directly and what must be delegated to WM rules, layer-shell, struts, or fallback always-on-top behavior."
      deliverables:
        - "docs/bar-architecture.md with accepted decisions and explicit deferrals."
        - "An MVP checklist matching the release_slices.mvp section."
      acceptance:
        - "Every open question in features.md is answered, deferred with rationale, or converted into a tracked risk."
        - "The first supported platform path can be implemented without guessing about backend priority."
    - id: "BAR-M1"
      title: "Create crates/unilii-bar and a blank Makepad top bar"
      priority: "P0"
      status: "partial"
      depends_on: ["BAR-M0"]
      objective: "Add the runnable binary crate and prove the window lifecycle before implementing modules."
      tasks:
        - id: "BAR-M1-T01"
          title: "Add workspace crate"
          details: "Create crates/unilii-bar/Cargo.toml and src/main.rs. Use workspace package metadata where possible."
        - id: "BAR-M1-T02"
          title: "Add Makepad dependency behind the bar crate"
          details: "Keep Makepad out of unilii-core, unilii-cli, and unilii-ui dependency graphs unless a shared type is intentionally needed."
        - id: "BAR-M1-T03"
          title: "Implement BarApp lifecycle skeleton"
          details: "Create src/app.rs with startup, shutdown, redraw request, and error reporting boundaries."
        - id: "BAR-M1-T04"
          title: "Render a frameless top-width placeholder"
          details: "Implement best-effort top placement, configured height, and always-on-top fallback."
        - id: "BAR-M1-T05"
          title: "Add basic logging and panic diagnostics"
          details: "Ensure early users can distinguish config errors, Makepad/window errors, and runtime module errors."
      deliverables:
        - "crates/unilii-bar/Cargo.toml"
        - "crates/unilii-bar/src/main.rs"
        - "crates/unilii-bar/src/app.rs"
      acceptance:
        - "cargo run -p unilii-bar opens a visible bar window or reports a clear platform limitation."
        - "cargo check --workspace succeeds after the crate is added."
    - id: "BAR-M2"
      title: "Implement bar configuration, defaults, and generation"
      priority: "P0"
      status: "partial"
      depends_on: ["BAR-M1"]
      objective: "Turn the example config in features.md into typed, validated configuration used by the app and CLI."
      tasks:
        - id: "BAR-M2-T01"
          title: "Define typed config structs"
          details: "Create BarConfig, Theme, Layout, ModuleSpec, action, state-style, and validation types in crates/unilii-bar/src/config.rs or a shared core module if needed."
        - id: "BAR-M2-T02"
          title: "Parse TOML and apply defaults"
          details: "Support the proposed [bar], [theme], [layout], and [[module]] schema. Validate duplicate ids, unknown modules, invalid intervals, and missing commands."
        - id: "BAR-M2-T03"
          title: "Add templates/bar.toml"
          details: "Provide starter config equivalent to the spec, with comments and safe defaults."
        - id: "BAR-M2-T04"
          title: "Wire CLI generation"
          details: "Extend existing CLI/config generation so unilii can emit the starter unilii-bar config without requiring the bar binary to run."
        - id: "BAR-M2-T05"
          title: "Add config file discovery"
          details: "Support explicit --config and default lookup under XDG-style config paths."
      deliverables: ["crates/unilii-bar/src/config.rs", "templates/bar.toml", "CLI command or option that generates bar config"]
      acceptance:
        - "The config example from features.md parses successfully."
        - "Invalid configs return actionable diagnostics naming the bad field and module id."
        - "Tests cover defaults, duplicate ids, unknown module types, and interval validation."
    - id: "BAR-M3"
      title: "Map theme and layout to Makepad views"
      priority: "P0"
      status: "partial"
      depends_on: ["BAR-M2"]
      objective: "Render configured zones and modules consistently before adding live data."
      tasks:
        - id: "BAR-M3-T01"
          title: "Implement layout zones"
          details: "Create left, center, and right containers; preserve declarative module ordering from config."
        - id: "BAR-M3-T02"
          title: "Implement theme mapping"
          details: "Map font, size, foreground, background, accent, warning, critical, padding, margin, and border settings to Makepad style values."
        - id: "BAR-M3-T03"
          title: "Define common module view model"
          details: "Represent label, tooltip, state, visibility, css-like style overrides, and pending error state."
        - id: "BAR-M3-T04"
          title: "Implement state styling"
          details: "Support ok, warning, critical, active, visible, urgent, empty, muted, charging, and disconnected states where applicable."
      deliverables: ["crates/unilii-bar/src/layout.rs", "crates/unilii-bar/src/theme.rs", "A static rendered bar matching configured zones and sample theme"]
      acceptance:
        - "Changing theme and layout in config changes the rendered bar without code edits."
        - "Disabled modules are not rendered and unknown module references produce diagnostics."
    - id: "BAR-M4"
      title: "Build module runtime, scheduler, actions, and hot reload"
      priority: "P0"
      status: "partial"
      depends_on: ["BAR-M3"]
      objective: "Provide the runtime foundation all modules use for independent updates and user actions."
      tasks:
        - id: "BAR-M4-T01"
          title: "Define BarModule and ModuleContext traits"
          details: "Support init, update, optional event stream, render model output, and shutdown/cancel hooks."
        - id: "BAR-M4-T02"
          title: "Implement scheduler"
          details: "Run interval-based modules independently, coalesce redraws, and isolate module failures."
        - id: "BAR-M4-T03"
          title: "Implement config hot reload"
          details: "Watch the config file, validate new config, rebuild the module graph safely, and keep the previous graph alive if reload fails."
        - id: "BAR-M4-T04"
          title: "Implement action dispatcher"
          details: "Support on_click_left, on_click_middle, on_click_right for shell commands and internal module actions."
        - id: "BAR-M4-T05"
          title: "Add capability/error reporting"
          details: "Expose unavailable dependencies, command failures, and stale module values in diagnostics and optional tooltips."
      deliverables: ["crates/unilii-bar/src/modules/mod.rs", "scheduler and action dispatcher modules", "hot reload integration in BarApp"]
      acceptance:
        - "Each module can update without blocking other modules."
        - "Reload failure keeps the last working bar config active."
        - "Click actions are debounced or otherwise protected from accidental duplicate execution."
    - id: "BAR-M5"
      title: "Implement first core modules: clock, script, and system"
      priority: "P0"
      status: "partial"
      depends_on: ["BAR-M4"]
      objective: "Deliver the simplest useful data modules and validate the runtime contract."
      tasks:
        - id: "BAR-M5-T01"
          title: "Implement clock module"
          details: "Support format string, timezone option, interval updates, and locale-safe fallback formatting."
        - id: "BAR-M5-T02"
          title: "Implement script module"
          details: "Support command, env, interval, timeout, output trimming/parsing, stale output handling, and click action."
        - id: "BAR-M5-T03"
          title: "Implement system module"
          details: "Support CPU, memory, load, and temperature providers with warning/critical thresholds."
        - id: "BAR-M5-T04"
          title: "Add module tests"
          details: "Cover config parsing, scheduler intervals, script timeout, command failure, and threshold formatting."
      deliverables: ["crates/unilii-bar/src/modules/clock.rs", "crates/unilii-bar/src/modules/script.rs", "crates/unilii-bar/src/modules/system.rs"]
      acceptance:
        - "A sample config can render clock, script output, CPU, and memory in the bar."
        - "A hanging script is killed at timeout and does not block redraws."
        - "System thresholds set warning and critical states deterministically."
    - id: "BAR-M6"
      title: "Implement Linux desktop status modules"
      priority: "P1"
      status: "partial"
      depends_on: ["BAR-M5"]
      objective: "Add the non-WM desktop modules needed for a practical Polybar replacement."
      tasks:
        - id: "BAR-M6-T01"
          title: "Implement network module"
          details: "Show interface status, IP address, up/down state, and Wi-Fi SSID when available."
        - id: "BAR-M6-T02"
          title: "Implement vpn module"
          details: "Detect common tunnel interfaces and support optional command probe overrides."
        - id: "BAR-M6-T03"
          title: "Implement audio module"
          details: "Support PipeWire/PulseAudio volume and mute using available command/API backends; expose toggle and mixer actions."
        - id: "BAR-M6-T04"
          title: "Implement battery module"
          details: "Show percentage, charging/discharging state, estimated state when available, and low/critical thresholds."
      deliverables: ["crates/unilii-bar/src/modules/network.rs", "crates/unilii-bar/src/modules/vpn.rs", "crates/unilii-bar/src/modules/audio.rs", "crates/unilii-bar/src/modules/battery.rs"]
      acceptance:
        - "Missing system dependencies degrade to disabled/unavailable state instead of crashing."
        - "Each module documents its Linux commands/files/API dependencies."
        - "State transitions are covered by unit tests or fixture-based tests where practical."
    - id: "BAR-M7"
      title: "Implement workspace and focused-window integration"
      priority: "P1"
      status: "partial"
      depends_on: ["BAR-M4"]
      objective: "Support the interactive WM behavior that makes the bar a real Polybar replacement."
      tasks:
        - id: "BAR-M7-T01"
          title: "Define WmBackend trait"
          details: "Represent workspace list, active workspace, urgent state, visible state, focused window title, and switch-workspace actions."
        - id: "BAR-M7-T02"
          title: "Implement i3 backend"
          details: "Use i3-msg for initial implementation and later replace with an event socket if needed."
        - id: "BAR-M7-T03"
          title: "Implement sway backend"
          details: "Use swaymsg for initial implementation with config-selectable backend."
        - id: "BAR-M7-T04"
          title: "Implement generic fallback backend"
          details: "Use wmctrl, xprop, or configured shell commands where i3/sway are unavailable."
        - id: "BAR-M7-T05"
          title: "Implement workspaces and window_title modules"
          details: "Render active, visible, urgent, and empty workspace states; expose click-to-switch behavior."
      deliverables: ["crates/unilii-bar/src/modules/workspaces.rs", "crates/unilii-bar/src/modules/window_title.rs", "WM backend module and docs"]
      acceptance:
        - "Active workspace state updates correctly on i3 or sway."
        - "Clicking a workspace switches to that workspace."
        - "Focused window title updates and falls back to empty or host label when unavailable."
    - id: "BAR-M8"
      title: "Integrate bar module providers with unilii discovery"
      priority: "P1"
      status: "partial"
      depends_on: ["BAR-M2", "BAR-M4"]
      objective: "Reuse existing project scan/config-generation concepts for bar module metadata without conflating runtime widget modules with existing command modules."
      tasks:
        - id: "BAR-M8-T01"
          title: "Add bar registry types"
          details: "Create crates/unilii-core/src/bar_registry.rs with ModuleProvider metadata, config schema/defaults, capability requirements, polling/event info, and optional Makepad binding info."
        - id: "BAR-M8-T02"
          title: "Expose bar registry from unilii-core"
          details: "Re-export bar registry APIs without changing existing ModuleRegistry behavior."
        - id: "BAR-M8-T03"
          title: "Extend scanner metadata extraction"
          details: "Recognize bar module provider declarations in Makepad-enabled or bar-enabled crates."
        - id: "BAR-M8-T04"
          title: "Generate starter config from discovered providers"
          details: "Allow config generation to include provider defaults and schema-derived comments."
        - id: "BAR-M8-T05"
          title: "Add registry contract tests"
          details: "Ensure discovered providers produce stable ids, valid defaults, and capability diagnostics."
      deliverables: ["crates/unilii-core/src/bar_registry.rs", "scanner support for bar metadata", "config generation using discovered bar providers"]
      acceptance:
