actual_bugs:
- id: BUG-001
  title: unknown tray icon names fall back to initials instead of generic icon
  evidence:
    command: cargo test --workspace
    exit_code: 101
    failure: tray::tests::icon_label_uses_known_icon_keywords
    observed: icon_label_for_name("unknown-icon") returned "U"
    expected: '"◉"'
    affected_regions:
    - unilii/bin/src/tray.rs:277-296 icon_label_for_name
    - unilii/bin/src/tray.rs:592-596 failing regression test
  consequence: The tray UI can display misleading one-letter badges for icon theme names that are not application names, and
    the workspace test suite is red.
  root_cause_hypothesis: The name-only helper applies initials fallback to arbitrary icon theme identifiers; that fallback
    is appropriate for app/service labels but too broad for unknown icon names.
  priority: P0
  status: done
  completed_at: '2026-05-16'
  resolution: icon_label_for_name now returns the generic tray marker for unknown icon theme names instead of deriving initials
    from arbitrary icon identifiers.
  verification:
  - 'RED: cargo test -p unilii-bin tray::tests::icon_label_uses_known_icon_keywords -- --nocapture exited 101 before the fix.'
  - 'GREEN: cargo test -p unilii-bin tray::tests::icon_label_uses_known_icon_keywords -- --nocapture exited 0 after the fix.'
- id: BUG-002
  title: CalDAV datetime suffix branch has identical outcomes and fails clippy gate
  evidence:
    command: cargo clippy --workspace --all-targets -- -D warnings
    exit_code: 101
    failure: clippy::if_same_then_else
    affected_regions:
    - unilii/lib/src/calendar/caldav.rs:256
    snippet: let suffix = if value.ends_with('Z') { "Z" } else { "Z" };
  consequence: Lint gate fails and the intended timezone normalization rule is unclear.
  root_cause_hypothesis: An unfinished normalization branch was left in place after deciding every value should be emitted
    with Z, or the non-Z branch should transform local/naive values differently.
  priority: P0
  status: done
  completed_at: '2026-05-16'
  resolution: Replaced the unfinished identical suffix branch with an explicit UTC-shape format string and added a characterization
    test for date-only, UTC datetime, and floating datetime ICS values.
  verification:
  - cargo test -p unilii-lib calendar::caldav::tests::normalizes_ics_datetime_values_to_utc_shape -- --nocapture exited 0.
  - cargo clippy -p unilii-lib --all-targets -- -D warnings exited 0.
