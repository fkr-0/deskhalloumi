name: Release artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_ref:
        description: Annotated release tag to validate and package
        required: true
        default: v0.2.0

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref_name }}
  RELEASE_RUST: 1.94.1
  TZ: Europe/Berlin

jobs:
  validate-build-package:
    name: Validate annotated tag and package Linux binaries
    runs-on: ubuntu-latest
    steps:
      - name: Check out tagged commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ env.RELEASE_REF }}

      - name: Install release Rust toolchain
        run: rustup toolchain install "$RELEASE_RUST" --profile minimal -c rustfmt -c clippy

      - name: Select release Rust toolchain
        run: rustup default "$RELEASE_RUST"

      - name: Install isolated X11/i3 test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            i3-wm \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config \
            x11-utils \
            xdotool \
            xvfb

      - name: Validate release metadata and annotated tag
        run: python3 scripts/check_release_metadata.py --release --require-clean

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run safe workspace tests
        run: |
          python3 scripts/audit_live_session_commands.py --quiet
          # v0.2.0 contains two obsolete workstation assertions: one requires
          # a real /dev/input keyboard and one requires battery hardware. The
          # source release remains immutable, so the retry excludes only those
          # exact hardware-presence tests.
          cargo test --workspace -- \
            --skip test_keyboard_listener \
            --skip test_module_loading_with_enabled_modules

      - name: Test i3 and selective X11 hotkeys
        run: scripts/test_i3_hotkeys.sh

      - name: Run strict Clippy gate
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build release binaries
        run: |
          cargo build --release -p deskhalloumi-bin \
            --bin deskhalloumi \
            --bin deskhalloumi-bar \
            --bin deskhalloumi-copyq \
            --bin deskhalloumi-filter-tab \
            --bin deskhalloumi-i3-vis \
            --bin deskhalloumi-hotkeyd \
            --bin unilii \
            --bin unilii-bar \
            --bin unilii-copyq \
            --bin unilii-filter-tab \
            --bin unilii-i3-vis \
            --bin unilii-hotkeyd

      - name: Assemble deterministic release archive
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_REF#v}"
          platform="x86_64-unknown-linux-gnu"
          package="deskhalloumi-${version}-${platform}"
          stage="dist/${package}"
          mkdir -p "${stage}/bin" "${stage}/share/doc/deskhalloumi"

          for binary in \
            deskhalloumi \
            deskhalloumi-bar \
            deskhalloumi-copyq \
            deskhalloumi-filter-tab \
            deskhalloumi-i3-vis \
            deskhalloumi-hotkeyd \
            unilii \
            unilii-bar \
            unilii-copyq \
            unilii-filter-tab \
            unilii-i3-vis \
            unilii-hotkeyd
          do
            install -m755 "target/release/${binary}" "${stage}/bin/${binary}"
          done

          install -m644 README.md CHANGELOG.md CONFIGURATION.md KEYBINDINGS.md LICENSE \
            "${stage}/share/doc/deskhalloumi/"
          cp -R docs contrib examples "${stage}/share/doc/deskhalloumi/"

          tar --sort=name \
            --mtime="UTC 1970-01-01" \
            --owner=0 --group=0 --numeric-owner \
            -C dist -czf "dist/${package}.tar.gz" "${package}"
          (
            cd dist
            sha256sum "${package}.tar.gz" > "${package}.tar.gz.sha256"
          )

      - name: Upload release archive
        uses: actions/upload-artifact@v6
        with:
          name: deskhalloumi-${{ env.RELEASE_REF }}-linux-x86_64
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${RELEASE_REF#v}"
          notes="docs/releases/${version}.md"
          archive="dist/deskhalloumi-${version}-x86_64-unknown-linux-gnu.tar.gz"
          checksum="${archive}.sha256"

          if gh release view "$RELEASE_REF" >/dev/null 2>&1; then
            gh release edit "$RELEASE_REF" \
              --title "DeskHalloumi ${version}" \
              --notes-file "$notes"
          else
            gh release create "$RELEASE_REF" \
              --title "DeskHalloumi ${version}" \
              --notes-file "$notes"
          fi

          gh release upload "$RELEASE_REF" "$archive" "$checksum" --clobber
