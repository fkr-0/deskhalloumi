[bar]
height = 28
position = "top"
reserve_space = true
hot_reload = true

[theme]
background = "#1e1e2e"
foreground = "#cdd6f4"
accent = "#89b4fa"
warning = "#f9e2af"
critical = "#f38ba8"
font_family = "monospace"
font_size = 13
padding = 8
margin = 0
border_size = 0

[layout]
left = ["workspaces"]
center = ["window_title"]
right = ["system", "network", "vpn", "audio", "battery", "notifications", "clock"]

[[module]]
id = "workspaces"
type = "workspaces"
backend = "i3"
format_active = "[{name}]"
format_inactive = "{name}"
separator = " "

[[module]]
id = "window_title"
type = "window_title"
backend = "i3"
format = "{title}"
max_len = 80

[[module]]
id = "system"
type = "system"
interval_ms = 2000
format = "load {load1} mem {memory_used_percent}%"
memory_warning_percent = 80
memory_critical_percent = 90

[[module]]
id = "network"
type = "network"
interval_ms = 5000
format = "{interface} {state} {ip} {ssid}"

[[module]]
id = "vpn"
type = "vpn"
interval_ms = 5000

[[module]]
id = "audio"
type = "audio"
interval_ms = 1000
format = "vol {volume}% {muted}"
on_click_left = "pavucontrol"

[[module]]
id = "battery"
type = "battery"
interval_ms = 10000
warning_percent = 20
critical_percent = 10
format = "{percentage}% {state}"

[[module]]
id = "notifications"
type = "notifications"
interval_ms = 5000
format = "notify {count}"

[[module]]
id = "clock"
type = "clock"
interval_ms = 1000
format = "%Y-%m-%d %H:%M:%S"
