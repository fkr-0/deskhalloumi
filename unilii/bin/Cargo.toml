[package]
name = "unilii-bin"
version.workspace = true
edition.workspace = true

[[bin]]
name = "unilii"
path = "src/main.rs"

[[bin]]
name = "test_dbus"
path = "src/test_dbus.rs"

[dependencies]
iced.workspace = true
tokio.workspace = true
serde.workspace = true
toml.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
thiserror.workspace = true
zbus.workspace = true
clap.workspace = true
chrono.workspace = true

unilii-core.workspace = true
unilii-lib.workspace = true

# Plugin modules (enabled via features)
unilii-clock = { workspace = true, optional = true }
unilii-battery = { workspace = true, optional = true }

[dev-dependencies]
tempfile = "3.13"
serde_json.workspace = true

[features]
default = ["clock", "battery"]
clock = ["unilii-clock"]
battery = ["unilii-battery"]
