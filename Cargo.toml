tokio = { version = "1.49", features = [
  "rt-multi-thread",
  "macros",
  "time",
  "sync",
  "net",
] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
clap = { version = "4.5", features = ["derive"] }

# Additional dependencies
toml = "0.8"
tracing = "0.1"
tracing-subscriber = "0.3"
chrono = "0.4"
directories = "5"
thiserror = "1.0"
zbus = { version = "4.4", default-features = false, features = ["tokio"] }

# Internal crates
unilii-lib = { path = "unilii/lib" }
unilii-core = { path = "unilii/core" }
unilii-clock = { path = "unilii/plugins/Clock" }
unilii-battery = { path = "unilii/plugins/Battery" }
unilii-tmux = { path = "unilii/plugins/Tmux" }
# Core dependencies
