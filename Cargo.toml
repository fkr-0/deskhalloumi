[workspace]
resolver = "2"
members = [
  "unilii",
  "unilii/core",
  "unilii/lib",
  "unilii/bin",
  "unilii/plugins/Clock",
  "unilii/plugins/Battery",
  "unilii/plugins/Tmux",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
authors = ["unilii contributors"]

[workspace.dependencies]
iced = { version = "0.14", features = [
  "advanced",
  "advanced-shaping",
  "basic-shaping",
  "canvas",
  "crisp",
  "debug",
  "default",
  "fira-sans",
  "highlighter",
  "hot",
  "iced_highlighter",
  "image",
  "image-without-codecs",
  "lazy",
  "linux-theme-detection",
  "markdown",
  "qr_code",
  "selector",
  "sipper",
  "smol",
  "strict-assertions",
  "svg",
  "sysinfo",
  "tester",
  "thread-pool",
  "time-travel",
  "tiny-skia",
  "tokio",
  "unconditional-rendering",
  "wayland",
  "web-colors",
  "webgl",
  "wgpu",
  "wgpu-bare",
  "x11",
] }

