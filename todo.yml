remaining:
- id: SXHKD-010
  status: pending
  priority: P1
  gap: sxhkd numeric ranges, nested/correlated expansions, modes/chains, and replay are not equivalent.
  task: Extend migration parsing only where semantics can be represented exactly.
  acceptance_criteria:
  - Realistic fixture corpus classifies each binding as exact, approximate, or unsupported.
  - No unsupported construct becomes an active literal chord.
  - Generated TOML and i3 output round-trip through validation.
  suggested_files:
  - unilii/core/src/key_import_sxhkd.rs
  - unilii/core/tests/fixtures/sxhkd
- id: HK-KEYS-011
  status: pending
  priority: P1
  gap: Current evdev physical-key naming and i3/X11 logical keysyms are not a single explicit model.
  task: Define backend-neutral physical versus logical key semantics.
  acceptance_criteria:
  - Configuration chooses physical or logical interpretation explicitly.
  - Import/export reports semantic changes caused by keyboard layout.
  - Tests cover at least US and German layout-sensitive shortcuts.
  suggested_files:
  - unilii/core/src/key_spec.rs
  - KEYBINDINGS.md
- id: HK-EVDEV-012
  status: pending
  priority: P1
  gap: The udev monitor does not add or remove active keyboard streams dynamically.
  task: Implement keyboard hotplug lifecycle for the evdev backend.
  acceptance_criteria:
  - New keyboards become active without daemon restart.
  - Removed devices do not terminate the aggregate stream.
  - Device duplication and permission errors are observable.
  suggested_files:
  - unilii/lib/src/input.rs
- id: HK-SOAK-020
  status: pending
  priority: P2
  gap: Long-running reload, device, and action performance budgets are not recorded.
  task: Add soak tests and bounded runtime metrics.
  acceptance_criteria:
  - Repeated reloads retain the last-known-good generation.
  - Idle CPU and memory budgets are measured.
  - Action failure volume cannot create unbounded logs or child processes.
release_gate:
  required_commands:
  - cargo fmt --all -- --check
  - python3 scripts/check_release_metadata.py --candidate
  - scripts/test_safe.sh
  - scripts/test_i3_hotkeys.sh
  - CARGO_INCREMENTAL=0 cargo clippy --workspace --all-targets -- -D warnings
  manual_checks:
  - Review CHANGELOG.md migration notes.
  - Confirm generated i3 include in an isolated or intentionally selected session.
  - Confirm no sxhkd and i3 duplicate ownership remains at cutover.
